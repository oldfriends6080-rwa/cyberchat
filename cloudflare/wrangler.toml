name = "cyberchat-reclaim-relay"
main = "worker.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# KV 命名空间用于临时存储 proof（声明周期 5 分钟）
# 需在 Cloudflare Dashboard 创建并绑定
kv_namespaces = [
  { binding = "PROOF_CACHE", id = "daeb4b8fdf7542f388f91da4a6adda91" }
]


# 环境变量（建议通过 Dashboard 设置）
# [vars]
# ALLOWED_APP_ID = "cyberchat-prod-2026"
# RECLAIM_WEBHOOK_SECRET = "your-webhook-secret"

# 生产环境限制
# limits = { cpu_ms = 50, memory_mb = 128 }
